schema_version: "0.1.0"
meta:
  name: env-monitoring-urban
  description: Urban environmental monitoring loop with intermittent GNSS multipath.
profile: jetson-agx-orin
tick_budget: 600
steps:
  - { at_min: 0, action: state_transition, args: { trigger: monitoring } }
  - { at_min: 5, action: inject_sensor_drift, args: { source: position, north_mps: 0.1 } }
  - { at_min: 25, action: inject_sensor_drift, args: { source: position, north_mps: 0.0 } }
  - { at_min: 55, action: state_transition, args: { trigger: complete } }
