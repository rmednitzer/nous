# /etc/logrotate.d/nous
#
# Daily rotation of the append-only nous audit log. The active file is
# kept append-only via `chattr +a` (set by deploy/install.sh on first
# rotation); postrotate re-applies the attribute to the new file.

/var/log/nous/audit.jsonl {
    daily
    rotate 90
    missingok
    notifempty
    compress
    delaycompress
    nocreate
    sharedscripts
    postrotate
        # Drop append-only on the rotated file so compress can run, then
        # re-apply on the freshly created active file.
        /usr/bin/chattr -a /var/log/nous/audit.jsonl.1 2>/dev/null || true
        /usr/bin/touch /var/log/nous/audit.jsonl
        /usr/bin/chown nous:nous /var/log/nous/audit.jsonl
        /usr/bin/chmod 640 /var/log/nous/audit.jsonl
        /usr/bin/chattr +a /var/log/nous/audit.jsonl 2>/dev/null || true
        /bin/systemctl kill -s SIGHUP nous.service 2>/dev/null || true
    endscript
}
