#cloud-config

# nous VM bootstrap. Pass this as user data on a fresh Ubuntu 26.04 LTS host.
# See ADR 0016 for the baseline rationale. The bundle also runs on 24.04;
# the `python3` meta-package pulls in the platform default (3.14 on 26.04,
# 3.12 on 24.04) and `install.sh` selects the newest available interpreter.

package_update: true
package_upgrade: false

packages:
  - python3
  - python3-venv
  - python3-pip
  - git
  - caddy
  - logrotate
  - sqlite3
  - curl
  - jq

users:
  - name: nous
    system: true
    shell: /usr/sbin/nologin
    home: /var/lib/nous
    create_home: true

write_files:
  - path: /etc/nous/nous.env
    permissions: "0644"
    content: |
      NOUS_HOME=/var/lib/nous
      NOUS_TRANSPORT=http
      NOUS_HTTP_BIND=127.0.0.1:8088
      NOUS_POLICY=open
      NOUS_PROFILE=jetson-agx-orin
      NOUS_OAUTH_ENABLED=true
      NOUS_OAUTH_ISSUER=https://nous.example.org
      NOUS_OAUTH_SINGLE_CLIENT=true
      NOUS_AUDIT_PATH=/var/log/nous/audit.jsonl

runcmd:
  - install -d -m 0750 -o nous -g nous /var/lib/nous /etc/nous /var/log/nous
  - install -d -m 0755 /opt
  - git clone https://github.com/rmednitzer/nous.git /opt/nous
  - bash /opt/nous/deploy/install.sh
  - systemctl daemon-reload
  - systemctl enable --now nous.service nous-state-flush.timer nous-auto-update.timer caddy
