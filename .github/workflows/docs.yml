name: Docs

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build MkDocs site
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Regenerate generated docs
        run: |
          uv run python scripts/gen_tool_reference.py
          uv run python scripts/gen_adr_index.py
          uv run python scripts/gen_mkdocs_adr_nav.py
          uv run python scripts/gen_backlog_summary.py
          uv run python scripts/gen_showcase_telemetry.py

      - name: Build MkDocs site
        run: uv run mkdocs build --strict

      - name: Emit CycloneDX SBOM
        run: |
          # Address PR #57 review (Codex + Copilot): the
          # ``cyclonedx-py environment`` subcommand would inventory
          # the isolated ``uv tool`` venv, not the project. Export
          # the resolved lockfile to a requirements file and feed
          # it to the ``requirements`` subcommand so the SBOM
          # describes the ``nous`` deployable. ``NO_COLOR=1`` keeps
          # ANSI escapes out of the stdout capture; strip the
          # editable ``-e .`` line (the project itself; no
          # pinned version means CycloneDX would emit a noisy
          # ``unknown`` component).
          NO_COLOR=1 uv export --format requirements-txt --no-hashes 2>/dev/null \
            | grep -v '^-e ' > sbom-requirements.txt
          uv tool run --from cyclonedx-bom cyclonedx-py requirements \
            --output-format JSON --output-file sbom.cdx.json \
            sbom-requirements.txt
          ls -l sbom.cdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 90

      - name: Upload Pages artefact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
