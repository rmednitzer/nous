name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: ruff + mypy + pytest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: make check
        run: make check

  policy:
    name: policy checks (em-dash, private-repo)
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: make policy
        run: make policy

  supply-chain:
    name: pip-audit + bandit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Export project requirements from uv.lock
        run: |
          # Address PR #57 review (Codex + Copilot): ``uv tool run``
          # would audit pip-audit's isolated tool venv, not the
          # project. Export the resolved lockfile to a requirements
          # file and audit that. ``NO_COLOR=1`` keeps ANSI escapes
          # out of the stdout capture; we strip the editable
          # ``-e .`` line (the project itself) because the
          # vulnerability databases do not carry an entry for
          # ``nous``.
          NO_COLOR=1 uv export --format requirements-txt --no-hashes 2>/dev/null \
            | grep -v '^-e ' > project-requirements.txt
          wc -l project-requirements.txt

      - name: pip-audit
        run: |
          uv tool run --from pip-audit pip-audit --strict \
            --disable-pip --no-deps -r project-requirements.txt

      - name: bandit
        run: uv tool run --from bandit bandit -r src/nous
