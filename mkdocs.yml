site_name: nous
site_description: "Simulation-based digital twin of an edge-AI inference appliance: per-subsystem physics and recursive estimators feed a self-model an LLM controller queries over MCP."
site_url: https://rmednitzer.github.io/nous/
repo_url: https://github.com/rmednitzer/nous
repo_name: rmednitzer/nous
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - toc.integrate
    - content.code.copy
    - content.code.annotate

nav:
  - Overview: README.md
  - Architecture: architecture.md
  - Modelling assumptions: assumptions.md
  - State machine: state-machine.md
  - Subsystems: subsystems/README.md
