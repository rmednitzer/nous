schema_version: "0.1.0"
name: pi5-hailo
description: Raspberry Pi 5 with a Hailo-8L accelerator. Lightweight profile.

power:
  battery_wh: 99
  voltage_v_nominal: 11.1
  voltage_v_min: 9.0
  voltage_v_max: 12.6
  internal_resistance_ohm: 0.08
  rated_current_a: 2.0
  peukert_k: 1.05
  soc_pct_low_threshold: 25
  soc_pct_critical_threshold: 5
  thermal_derate_c: 40
  thermal_derate_slope_per_c: 0.025
  charge_limit_w: 30

apu:
  solar_w_peak: 20
  fuelcell_w_continuous: 0
  solar:
    panel_w_peak: 20
    mppt_efficiency: 0.88
    panel_temp_derate_per_c_above_25: 0.005
  fuel_cell:
    continuous_w: 0
    fuel_capacity_g: 0
    efficiency: 0.0
    wh_per_g_fuel: 0.0
  vehicle:
    bus_voltage_v: 12.0
    current_limit_a: 2.0
  usb_c_pd:
    profiles_w: [15, 27, 45]
    default_profile_w: 27
  hand_crank:
    max_w: 10
    efficiency: 0.55

thermal:
  ambient_c_default: 25
  junction_temp_max: 85
  junction_temp_throttle: 75
  thermal_resistance_c_per_w: 1.0

compute:
  draw_w_idle: 3
  draw_w_load: 12
  load_curve:
    - { load_pct: 0, draw_w: 3 }
    - { load_pct: 50, draw_w: 7 }
    - { load_pct: 100, draw_w: 12 }
  inference_local:
    tok_per_s_p50: 25
    energy_j_per_tok: 0.40

sensors:
  position: { lat_sigma: 4.0e-5, lon_sigma: 4.0e-5, alt_m_sigma: 8.0 }
  environmental: { temp_c_sigma: 0.3, humidity_pct_sigma: 1.5, baro_kpa_sigma: 0.2 }
  biometrics: { heart_rate_bpm_sigma: 3.0, core_temp_c_sigma: 0.10 }

comms:
  links:
    - { id: lte, bandwidth_bps: 10000000, rssi_dbm_nominal: -80, loss_pct_nominal: 1.0, max_age_s: 30 }
    - { id: lora, bandwidth_bps: 50000, rssi_dbm_nominal: -110, loss_pct_nominal: 2.0, max_age_s: 120 }
