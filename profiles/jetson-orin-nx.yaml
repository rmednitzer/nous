schema_version: "0.1.0"
name: jetson-orin-nx
description: Smaller Jetson Orin NX variant.

# Hardware references:
#   battery:   1x Bren-Tronics BB-2590/U (296 Wh, 14.4 V nominal).
#   compute:   NVIDIA Jetson Orin NX 16GB datasheet (10 W -- 25 W envelope).
#   solar:     Bren-Tronics MFC-40 class (40 W peak).
#   fuel cell: SFC Energy EFOY-class (~15 W continuous, ~1.4 Wh/g electrical).
#   vehicle:   NATO STANAG 4074 vehicle bus (28 V DC).

power:
  battery_wh: 296
  voltage_v_nominal: 14.4
  voltage_v_min: 12.0
  voltage_v_max: 16.8
  internal_resistance_ohm: 0.06
  rated_current_a: 3.0
  peukert_k: 1.04
  soc_pct_low_threshold: 20
  soc_pct_critical_threshold: 5
  thermal_derate_c: 45
  thermal_derate_slope_per_c: 0.02
  charge_limit_w: 60

apu:
  solar_w_peak: 40
  fuelcell_w_continuous: 15
  solar:
    panel_w_peak: 40
    mppt_efficiency: 0.90
    panel_temp_derate_per_c_above_25: 0.004
  fuel_cell:
    continuous_w: 15
    fuel_capacity_g: 395             # ~0.5 L methanol cartridge (density 0.79 g/ml)
    efficiency: 0.25                 # SFC EFOY system efficiency (post-BOP)
    wh_per_g_fuel: 1.4               # SFC EFOY 0.9 L/kWh methanol consumption
  vehicle:
    bus_voltage_v: 28.0
    current_limit_a: 3.0
  usb_c_pd:
    profiles_w: [15, 27, 45, 60]
    default_profile_w: 45

thermal:
  ambient_c_default: 25
  junction_temp_max: 95
  junction_temp_throttle: 80
  thermal_resistance_c_per_w: 0.45

compute:
  draw_w_idle: 5
  draw_w_load: 25
  load_curve:
    - { load_pct: 0, draw_w: 5 }
    - { load_pct: 50, draw_w: 15 }
    - { load_pct: 100, draw_w: 25 }
  inference_local:
    # PLACEHOLDER until BL-043 (real local model under TensorRT-LLM or
    # llama.cpp on Jetson Orin NX 16GB). Order-of-magnitude estimates
    # consistent with published Jetson Orin NX INT8 benchmarks
    # (~45-50% of the AGX Orin envelope). Not measured.
    # ``docs/bom.md`` carries the cross-reference.
    tok_per_s_p50: 90
    energy_j_per_tok: 0.18

sensors:
  position: { lat_sigma: 3.0e-5, lon_sigma: 3.0e-5, alt_m_sigma: 5.0 }
  environmental: { temp_c_sigma: 0.2, humidity_pct_sigma: 1.0, baro_kpa_sigma: 0.1 }
  biometrics: { heart_rate_bpm_sigma: 2.0, core_temp_c_sigma: 0.05 }

comms:
  links:
    - { id: lte, bandwidth_bps: 20000000, rssi_dbm_nominal: -75, loss_pct_nominal: 0.5, max_age_s: 30 }
    - { id: lora, bandwidth_bps: 50000, rssi_dbm_nominal: -110, loss_pct_nominal: 2.0, max_age_s: 120 }
