schema_version: "0.1.0"
name: spot-core
description: Boston Dynamics Spot compute core.

# Hardware references:
#   battery:   Boston Dynamics Spot battery (605 Wh, 41.6 V nominal, 4.2 kg).
#   compute:   Spot CORE I/O compute payload (x86-class, ~30-90 W envelope).
#   solar:     none (Spot is platform-tethered for recharge; field swap or dock).
#   fuel cell: none (platform recharges via Spot dock).
#   vehicle:   48 V tether (Spot dock / charger reference).

power:
  battery_wh: 605
  voltage_v_nominal: 41.6
  voltage_v_min: 36.0
  voltage_v_max: 50.4
  internal_resistance_ohm: 0.10
  rated_current_a: 4.0
  peukert_k: 1.05
  soc_pct_low_threshold: 20
  soc_pct_critical_threshold: 5
  thermal_derate_c: 45
  thermal_derate_slope_per_c: 0.02
  charge_limit_w: 150

apu:
  solar_w_peak: 0
  fuelcell_w_continuous: 0
  solar:
    panel_w_peak: 0
    mppt_efficiency: 0.0
    panel_temp_derate_per_c_above_25: 0.0
  fuel_cell:
    continuous_w: 0
    fuel_capacity_g: 0
    efficiency: 0.0
    wh_per_g_fuel: 0.0
  vehicle:
    bus_voltage_v: 48.0
    current_limit_a: 8.0
  usb_c_pd:
    profiles_w: [60, 100, 240]
    default_profile_w: 100

thermal:
  ambient_c_default: 25
  junction_temp_max: 95
  junction_temp_throttle: 85
  thermal_resistance_c_per_w: 0.20

compute:
  draw_w_idle: 30
  draw_w_load: 90
  load_curve:
    - { load_pct: 0, draw_w: 30 }
    - { load_pct: 50, draw_w: 60 }
    - { load_pct: 100, draw_w: 90 }
  inference_local:
    # PLACEHOLDER until BL-043 (real local model on the Spot CORE I/O
    # x86-class compute payload). Order-of-magnitude estimate
    # consistent with published llama.cpp x86 benchmarks at the Spot
    # CORE envelope. Not measured. ``docs/bom.md`` carries the
    # cross-reference.
    tok_per_s_p50: 150
    energy_j_per_tok: 0.30

sensors:
  position: { lat_sigma: 2.0e-5, lon_sigma: 2.0e-5, alt_m_sigma: 3.0 }
  environmental: { temp_c_sigma: 0.1, humidity_pct_sigma: 0.5, baro_kpa_sigma: 0.05 }
  biometrics: { heart_rate_bpm_sigma: 5.0, core_temp_c_sigma: 0.20 }

comms:
  links:
    - { id: wifi, bandwidth_bps: 100000000, rssi_dbm_nominal: -55, loss_pct_nominal: 0.1, max_age_s: 5 }
    - { id: lte, bandwidth_bps: 20000000, rssi_dbm_nominal: -75, loss_pct_nominal: 0.5, max_age_s: 30 }
  outbox: { enabled: true, max_packages: 256, max_bytes: 1048576, default_ttl_s: 300 }  # BL-077
  emcon:  # BL-060: emission-control profiles; default unrestricted, inert until emcon_set
    default: unrestricted
    profiles:
      low_pi: { permit_links: [lte] }  # low-probability-of-intercept: cellular only
      lte_burst: { permit_links: [lte], window: { period_s: 60, on_s: 5 } }  # ADR 0066: emit 5s per 60s
