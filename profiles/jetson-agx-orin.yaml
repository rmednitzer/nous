schema_version: "0.1.0"
name: jetson-agx-orin
description: >
  Reference profile for an NVIDIA Jetson AGX Orin 64GB packed in a
  backpack-class enclosure with a ~588 Wh Li-ion pack, a 60 W solar
  panel, and a 25 W methanol fuel cell.

# Hardware references (keep numbers traceable to a datasheet):
#   battery:   2x Bren-Tronics BB-2590/U (294 Wh, 14.4 V nominal each).
#   compute:   NVIDIA Jetson AGX Orin 64GB datasheet (15 W -- 60 W envelope).
#   solar:     PowerFilm SOL90 / Bren-Tronics MFC-90 class (60 W peak).
#   fuel cell: SFC Energy EFOY-class methanol fuel cell
#              (~25 W continuous, ~0.9 L/kWh -> ~1.4 Wh/g electrical).
#   vehicle:   MIL-STD-1275 28 V DC vehicle bus.
#   eo/ir:     Teledyne FLIR Hadron 640R (EO + Boson 640 LWIR) class;
#              representative DRI-envelope ranges, not a calibrated datasheet
#              spec (docs/bom.md "EO/IR sensor payload", docs/conformance/eoir.md).

power:
  battery_wh: 588
  voltage_v_nominal: 14.4
  voltage_v_min: 12.0
  voltage_v_max: 16.8
  internal_resistance_ohm: 0.05
  rated_current_a: 5.0
  peukert_k: 1.04
  soc_pct_low_threshold: 20
  soc_pct_critical_threshold: 5
  cycle_life: 500
  thermal_derate_c: 45
  thermal_derate_slope_per_c: 0.02
  charge_limit_w: 100

apu:
  solar_w_peak: 60
  fuelcell_w_continuous: 25
  solar:
    panel_w_peak: 60
    mppt_efficiency: 0.92
    panel_temp_derate_per_c_above_25: 0.004
  fuel_cell:
    continuous_w: 25
    fuel_capacity_g: 790            # ~1 L methanol cartridge (density 0.79 g/ml)
    efficiency: 0.25                # SFC EFOY system efficiency (post-BOP), datasheet
    wh_per_g_fuel: 1.4              # SFC EFOY 0.9 L/kWh methanol consumption -> 1.4 Wh/g electrical
  vehicle:
    bus_voltage_v: 28.0
    current_limit_a: 5.0
  usb_c_pd:
    profiles_w: [15, 27, 45, 60, 100]
    default_profile_w: 60

thermal:
  ambient_c_default: 25
  junction_temp_max: 95
  junction_temp_throttle: 85
  thermal_resistance_c_per_w: 0.30
  enclosure_to_ambient_resistance_c_per_w: 0.5
  enclosure_mass_kg: 1.2
  enclosure_specific_heat_j_per_kg_k: 900
  junction_heat_capacity_j_per_k: 5.0
  headroom_threshold_c: 5.0

compute:
  draw_w_idle: 8
  draw_w_load: 60
  load_curve:
    - { load_pct: 0,   draw_w: 8 }
    - { load_pct: 25,  draw_w: 18 }
    - { load_pct: 50,  draw_w: 35 }
    - { load_pct: 75,  draw_w: 50 }
    - { load_pct: 100, draw_w: 60 }
  inference_local:
    # PLACEHOLDER until BL-043 (real local model under TensorRT-LLM or
    # llama.cpp on Jetson AGX Orin). The two figures below are
    # order-of-magnitude estimates consistent with published Jetson
    # AGX Orin INT8 inference benchmarks (NVIDIA Jetson Performance
    # data, llama.cpp Jetson benchmarks). They drive the latency /
    # energy figures the inference subsystem reports today but are
    # not measured. ``docs/bom.md`` carries the cross-reference.
    tok_per_s_p50: 200
    energy_j_per_tok: 0.12

storage:
  capacity_gib: 1024
  wear_pct_initial: 0.0
  write_amplification: 1.2

sensors:
  position:
    lat_sigma: 3.0e-5
    lon_sigma: 3.0e-5
    alt_m_sigma: 5.0
    fix_rate_hz: 10
  environmental:
    temp_c_sigma: 0.2
    humidity_pct_sigma: 1.0
    baro_kpa_sigma: 0.1
  biometrics:
    heart_rate_bpm_sigma: 2.0
    core_temp_c_sigma: 0.05
    hydration_pct_sigma: 1.0

# BL-055: EO/IR thermo-optical payload, a per-band detection-range envelope.
# Ranges shorten with humidity, an obscurant level (set_obscurant), thermal
# crossover (IR), darkness (EO, set_illumination), and calibration drift.
# Values: Hadron 640R / Boson 640 class, representative per docs/bom.md.
eoir:
  eo_r0_m: 12000            # clear-air EO reference detection range
  ir_r0_m: 8000             # clear-air IR reference detection range
  target_c: 32              # nominal target surface temperature
  contrast_dt_ref_c: 10     # thermal-contrast normalisation
  johnson_k_rec: 3          # recognition cycle ratio
  johnson_k_id: 6           # identification cycle ratio
  eo_range_sigma_m: 200
  ir_range_sigma_m: 150
  cal_floor: 0.3
  cal_drift_per_s: 0.002

comms:
  links:
    - id: lte
      bandwidth_bps: 20000000
      rssi_dbm_nominal: -75
      loss_pct_nominal: 0.5
      max_age_s: 30
    - id: lora
      bandwidth_bps: 50000
      rssi_dbm_nominal: -110
      loss_pct_nominal: 2.0
      max_age_s: 120
    - id: tak
      bandwidth_bps: 500000
      rssi_dbm_nominal: -85
      loss_pct_nominal: 1.0
      max_age_s: 60
  # Store-and-forward outbox (BL-077, ADR 0047). Optional: with this section
  # absent the outbox runs at the same defaults. Packages queued while a link
  # is degraded or denied are held and drained in precedence order as the link
  # recovers, instead of being dropped.
  outbox:
    enabled: true
    max_packages: 256
    max_bytes: 1048576        # 1 MiB total store-and-forward budget
    default_ttl_s: 300        # drop a queued package unsent after 5 minutes
