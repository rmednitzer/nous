; Alembic configuration for the nous SQLite state database.
;
; URL resolution (see alembic/env.py):
;   1. ``alembic -x url=sqlite:///path/to/state.db ...``
;   2. ``NOUS_DB_URL`` environment variable
;   3. ``sqlalchemy.url`` below (developer-local default)

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
sqlalchemy.url = sqlite:///.nous-state/state.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
