; Alembic configuration for the nous SQLite state database.
;
; The default URL points at the developer-local store under
; ``./.nous-state/state.db``. Production deployments set
; ``NOUS_DB_URL`` and run alembic with ``-x url=...`` or call
; ``alembic.config.Config`` from the runtime.

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
sqlalchemy.url = sqlite:///.nous-state/state.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
